# ── Hermes Agent configuration ────────────────────────────────────────────────
llm:
  backend: "claude"                    # "claude" | "local"
  claude_model: "claude-sonnet-4-5"
  local_model_path: null               # path to GGUF file if backend=local
  max_tokens: 4096
  temperature: 0.3

skills:
  directory: "hermes/skills"
  min_folds_before_creation: 3        # auto-create SKILL.md after this many folds
  auto_patch: true                     # allow Hermes to propose patches automatically
  patch_requires_j_improvement: true  # only accept patches that improve OOS J

reports:
  directory: "hermes/reports"
  fold_summary_file: "fold_summary.csv"
  retrain_log_file: "retrain_log.csv"
  shap_prefix: "shap_fold_"
  trade_log_prefix: "trades_fold_"

patch_log:
  file: "hermes/reports/patch_log.csv"
  # columns: timestamp, skill_file, description, old_j, new_j, accepted

degradation:
  check_after_market_close: true
  alert_channel: "console"            # "console" | "email" | "telegram"
