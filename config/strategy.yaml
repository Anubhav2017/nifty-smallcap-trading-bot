# ── Dataset ───────────────────────────────────────────────────────────────────
data:
  dataset_root: dataset_smallcap250   # or dataset_nifty50

# ── Universe ──────────────────────────────────────────────────────────────────
universe:
  index: NIFTY_SMALLCAP_250          # NSE broad small-cap index (~250 names)
  liquidity_filter_adtv_cr: 2.0        # min 20-day avg daily traded value (Crore INR)
  liquidity_lookback_days: 20

# ── Horizons ──────────────────────────────────────────────────────────────────
horizons:
  swing:
    min_hold_days: 2
    max_hold_days: 10
    label_day: 5                        # forward return reference day for labeling
  positional:
    min_hold_days: 10
    max_hold_days: 60
    label_day: 20

# ── Entry ─────────────────────────────────────────────────────────────────────
entry:
  top_n_candidates: 10                  # max stocks to score for entry each day
  min_win_prob: 0.55                    # minimum P(target before SL) to consider entry
  min_expected_value: 0.0              # min EV after costs (in R-multiples)

# ── Hybrid (daily shortlist + 5m entry timing) ────────────────────────────────
hybrid:
  enabled: true
  entry_start: "09:30"                  # first 5m bar eligible for entry
  entry_cutoff: "14:30"                 # last 5m bar eligible for entry
  min_timing_prob: 0.55                 # min P(good intraday entry) on 5m bar
  pick: best                            # best = highest prob in window; first = earliest hit

# ── Stop-loss and target ───────────────────────────────────────────────────────
exit:
  swing:
    atr_sl_multiple: 1.75              # SL = entry - k * ATR_14
    reward_risk_ratio: 2.0             # TP = entry + r * (entry - SL)
    atr_period: 14
  positional:
    atr_sl_multiple: 3.0
    reward_risk_ratio: 2.5
    atr_period: 14

# ── Risk ───────────────────────────────────────────────────────────────────────
risk:
  risk_per_trade_pct: 0.75             # % of equity risked per trade (at SL)
  max_daily_entries: 10                # hard cap on new entries per calendar day
  max_gross_exposure_pct: 80.0         # max % of equity deployed at any time
  swing_max_positions: 5
  positional_max_positions: 3

# ── Costs (Indian cash equity delivery) ───────────────────────────────────────
costs:
  brokerage_pct: 0.03                  # per leg, as % of turnover (flat-rate broker)
  stt_delivery_pct: 0.1                # STT on delivery sell side only
  stamp_duty_pct: 0.015                # on buy side
  exchange_txn_charge_pct: 0.00345     # NSE transaction charge
  sebi_turnover_fee_pct: 0.0001
  gst_on_charges_pct: 18.0            # GST on brokerage + exchange charges
  slippage_min_pct: 0.05              # minimum slippage assumption per leg
  slippage_spread_factor: 0.1         # slippage = max(min, factor * spread_proxy)

# ── Walk-forward ───────────────────────────────────────────────────────────────
walk_forward:
  train_years: 0.25                   # ~63 trading days (~3 months rolling train window)
  validate_weeks: 1                   # 1-week OOS per fold (overrides validate_months)
  step_weeks: 1                       # advance 1 week per fold → weekly model update
  validate_months: 2                  # fallback if validate_weeks omitted
  step_months: 1                        # fallback if step_weeks omitted
  min_folds_for_promotion: 2          # OOS J must beat baselines for this many consecutive folds

# ── Objective J weights ────────────────────────────────────────────────────────
objective:
  alpha: 2.0                           # MaxDD penalty weight
  beta: 1.0                            # TurnoverCost penalty weight
  # gamma = infinity (hard reject if trades_per_day > 10; enforced separately)

# ── Retrain schedule and degradation thresholds ────────────────────────────────
retrain:
  schedule_weeks: 1                    # retrain model every week (overrides schedule_months)
  schedule_months: 1                   # fallback if schedule_weeks omitted
  degradation:
    sortino_floor: 0.0                 # rolling 14-session Sortino below this triggers retrain
    win_rate_drop_pct: 15.0           # vs backtest expectation, over last 20 trades
    drawdown_multiplier: 2.0          # live DD > multiplier * OOS backtest MaxDD
    rolling_window_sessions: 14
    min_trades_for_winrate_check: 20
    cooldown_sessions: 10             # min sessions between emergency retrains

# ── Hermes meta-loop ───────────────────────────────────────────────────────────
hermes:
  min_folds_before_skill_creation: 3  # Hermes waits for this many folds before distilling
  llm_backend: "claude"               # "claude" | "local"  (local = Nous-Hermes GGUF)
  patch_acceptance_requires_j_improvement: true
